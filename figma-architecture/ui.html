<!DOCTYPE html>
<html>
<head>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: Inter, -apple-system, sans-serif;
      font-size: 12px;
      background: #1e1e2e;
      color: #cdd6f4;
      padding: 16px;
      width: 300px;
    }
    h2 {
      font-size: 13px;
      font-weight: 600;
      color: #cba6f7;
      margin-bottom: 4px;
    }
    .subtitle {
      font-size: 11px;
      color: #6c7086;
      margin-bottom: 14px;
      line-height: 1.4;
    }
    .section-title {
      font-size: 10px;
      font-weight: 600;
      color: #6c7086;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 8px;
    }
    .checks {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-bottom: 14px;
    }
    .check-row {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      padding: 6px 8px;
      border-radius: 6px;
      border: 1px solid #313244;
      transition: border-color 0.15s;
    }
    .check-row:hover { border-color: #585b70; }
    .check-row input[type=checkbox] { accent-color: #cba6f7; width: 14px; height: 14px; }
    .check-label { font-size: 11px; flex: 1; }
    .check-badge {
      font-size: 10px;
      color: #6c7086;
      background: #181825;
      padding: 1px 6px;
      border-radius: 10px;
    }
    button#generate {
      width: 100%;
      padding: 9px;
      background: #cba6f7;
      color: #1e1e2e;
      border: none;
      border-radius: 8px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    button#generate:hover { opacity: 0.88; }
    button#generate:disabled { opacity: 0.4; cursor: not-allowed; }
    #status {
      font-size: 11px;
      color: #a6e3a1;
      margin-top: 10px;
      min-height: 16px;
      text-align: center;
    }
    #status.error { color: #f38ba8; }
    .divider {
      border: none;
      border-top: 1px solid #313244;
      margin: 12px 0;
    }
  </style>
</head>
<body>
  <h2>Dummy Trading — Architecture</h2>
  <p class="subtitle">Generates visual architecture frames on the current Figma page.</p>

  <div class="section-title">Select Frames</div>
  <div class="checks">
    <label class="check-row">
      <input type="checkbox" id="f1" checked>
      <span class="check-label">App Overview</span>
      <span class="check-badge">3-tier</span>
    </label>
    <label class="check-row">
      <input type="checkbox" id="f2" checked>
      <span class="check-label">Page Navigation Map</span>
      <span class="check-badge">22 pages</span>
    </label>
    <label class="check-row">
      <input type="checkbox" id="f3" checked>
      <span class="check-label">API Route Map</span>
      <span class="check-badge">25 routes</span>
    </label>
    <label class="check-row">
      <input type="checkbox" id="f4" checked>
      <span class="check-label">Data Model Diagram</span>
      <span class="check-badge">10 models</span>
    </label>
    <label class="check-row">
      <input type="checkbox" id="f5" checked>
      <span class="check-label">Service Layer Map</span>
      <span class="check-badge">5 domains</span>
    </label>
  </div>

  <button id="generate">Generate Diagram</button>
  <div id="status"></div>

  <script>
    const btn = document.getElementById('generate');
    const status = document.getElementById('status');

    btn.addEventListener('click', () => {
      const options = {
        f1: document.getElementById('f1').checked,
        f2: document.getElementById('f2').checked,
        f3: document.getElementById('f3').checked,
        f4: document.getElementById('f4').checked,
        f5: document.getElementById('f5').checked,
      };
      const count = Object.values(options).filter(Boolean).length;
      if (count === 0) {
        status.className = 'error';
        status.textContent = 'Select at least one frame.';
        return;
      }
      btn.disabled = true;
      status.className = '';
      status.textContent = `Generating ${count} frame(s)…`;
      parent.postMessage({ pluginMessage: { type: 'generate', options } }, '*');
    });

    window.onmessage = (event) => {
      const msg = event.data.pluginMessage;
      if (!msg) return;
      if (msg.type === 'done') {
        btn.disabled = false;
        status.className = '';
        status.textContent = msg.text || 'Done!';
      } else if (msg.type === 'error') {
        btn.disabled = false;
        status.className = 'error';
        status.textContent = msg.text || 'An error occurred.';
      }
    };
  </script>
</body>
</html>
