services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: dummy_trading
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  server:
    build:
      context: .
      dockerfile: server/Dockerfile
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/dummy_trading?schema=public
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      PORT: "3001"
    ports:
      - "3001:3001"
    depends_on:
      - postgres

  client:
    build:
      context: .
      dockerfile: client/Dockerfile
    ports:
      - "80:80"
    depends_on:
      - server

volumes:
  pgdata:
